<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>双语翻译助手</title>
  <link rel="stylesheet" href="popup.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <h1><i class="fas fa-language"></i> 双语翻译助手</h1>
      <p class="subtitle">轻松实现网页双语对照翻译</p>
    </header>
    
    <main class="main">
      <div class="button-group">
        <button id="translatePageBtn" class="btn btn-primary">
          <i class="fas fa-globe"></i>
          <span>翻译整页</span>
          <small>将当前页面全部内容翻译</small>
        </button>
        
        <button id="translateSelectionBtn" class="btn btn-secondary">
          <i class="fas fa-mouse-pointer"></i>
          <span>翻译选中内容</span>
          <small>仅翻译您选中的文本</small>
        </button>
      </div>
      
      <div class="status" id="status">
        <i class="fas fa-info-circle"></i>
        <span>就绪，点击按钮开始翻译</span>
      </div>
      
      <div class="settings">
        <h3><i class="fas fa-cog"></i> 设置</h3>
        <div class="setting-item">
          <label for="targetLanguage">目标语言:</label>
          <select id="targetLanguage">
            <option value="zh-CN">简体中文</option>
            <option value="zh-TW">繁体中文</option>
            <option value="en">英语</option>
            <option value="ja">日语</option>
            <option value="ko">韩语</option>
            <option value="fr">法语</option>
            <option value="de">德语</option>
          </select>
        </div>
        <div class="setting-item">
          <label>
            <input type="checkbox" id="showOriginal" checked>
            显示原文
          </label>
        </div>
      </div>
    </main>
    
    <footer class="footer">
      <p>© 2026 双语翻译助手 v1.0.0</p>
      <p><a href="#" id="optionsLink">扩展设置</a></p>
    </footer>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
