<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>双语翻译助手 - 设置</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
    }
    
    body {
      background-color: #f5f7ff;
      color: #333;
      min-height: 100vh;
      padding: 30px;
    }
    
    .container {
      max-width: 800px;
      margin: 0 auto;
      background-color: white;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
      padding: 40px;
    }
    
    header {
      text-align: center;
      margin-bottom: 40px;
    }
    
    h1 {
      font-size: 32px;
      color: #667eea;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 15px;
    }
    
    .subtitle {
      font-size: 16px;
      color: #777;
      margin-bottom: 30px;
    }
    
    .settings-section {
      margin-bottom: 40px;
      padding-bottom: 30px;
      border-bottom: 1px solid #eee;
    }
    
    .settings-section:last-child {
      border-bottom: none;
      margin-bottom: 0;
      padding-bottom: 0;
    }
    
    h2 {
      font-size: 22px;
      color: #555;
      margin-bottom: 20px;
      padding-bottom: 10px;
      border-bottom: 2px solid #667eea;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    .form-group {
      margin-bottom: 25px;
    }
    
    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
      color: #555;
    }
    
    select, input[type="text"], input[type="number"] {
      width: 100%;
      padding: 12px 15px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 16px;
      transition: border-color 0.3s;
    }
    
    select:focus, input[type="text"]:focus, input[type="number"]:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 2px rgba(102, 126, 234, 0.2);
    }
    
    .checkbox-group {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }
    
    .checkbox-item {
      display: flex;
      align-items: center;
    }
    
    .checkbox-item input {
      margin-right: 12px;
      transform: scale(1.3);
    }
    
    .checkbox-item label {
      margin-bottom: 0;
      cursor: pointer;
    }
    
    .checkbox-description {
      font-size: 14px;
      color: #777;
      margin-left: 30px;
      margin-top: 5px;
    }
    
    .button-group {
      display: flex;
      gap: 15px;
      margin-top: 40px;
    }
    
    button {
      padding: 14px 30px;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    
    .btn-save {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      flex: 1;
    }
    
    .btn-save:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(102, 126, 234, 0.3);
    }
    
    .btn-reset {
      background-color: #f0f0f0;
      color: #555;
      flex: 1;
    }
    
    .btn-reset:hover {
      background-color: #e0e0e0;
    }
    
    .status {
      margin-top: 20px;
      padding: 15px;
      border-radius: 8px;
      display: none;
    }
    
    .status.success {
      background-color: #e8f5e9;
      color: #2e7d32;
      border: 1px solid #c8e6c9;
      display: block;
    }
    
    .status.error {
      background-color: #ffebee;
      color: #c62828;
      border: 1px solid #ffcdd2;
      display: block;
    }
    
    footer {
      margin-top: 50px;
      text-align: center;
      color: #888;
      font-size: 14px;
    }
    
    footer a {
      color: #667eea;
      text-decoration: none;
    }
    
    footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1><i class="fas fa-cog"></i> 双语翻译助手设置</h1>
      <p class="subtitle">配置您的翻译偏好和扩展行为</p>
    </header>
    
    <main>
      <section class="settings-section">
        <h2><i class="fas fa-language"></i> 翻译设置</h2>
        
        <div class="form-group">
          <label for="defaultTargetLanguage">默认目标语言:</label>
          <select id="defaultTargetLanguage">
            <option value="zh-CN">简体中文</option>
            <option value="zh-TW">繁体中文</option>
            <option value="en">英语</option>
            <option value="ja">日语</option>
            <option value="ko">韩语</option>
            <option value="fr">法语</option>
            <option value="de">德语</option>
            <option value="es">西班牙语</option>
            <option value="ru">俄语</option>
          </select>
        </div>
        
        <div class="form-group">
          <label for="translationService">翻译服务:</label>
          <select id="translationService">
            <option value="google">Google 翻译</option>
            <option value="deepl">DeepL</option>
            <option value="microsoft">Microsoft Translator</option>
            <option value="youdao">有道翻译</option>
            <option value="baidu">百度翻译</option>
          </select>
        </div>
      </section>
      
      <section class="settings-section">
        <h2><i class="fas fa-eye"></i> 显示设置</h2>
        
        <div class="checkbox-group">
          <div class="checkbox-item">
            <input type="checkbox" id="alwaysShowOriginal" checked>
            <label for="alwaysShowOriginal">始终显示原文</label>
          </div>
          <div class="checkbox-description">
            启用后，翻译时会保留原文并显示在译文上方或旁边
          </div>
          
          <div class="checkbox-item">
            <input type="checkbox" id="showTranslationTooltip">
            <label for="showTranslationTooltip">显示翻译提示框</label>
          </div>
          <div class="checkbox-description">
            鼠标悬停在翻译文本上时显示原文提示
          </div>
          
          <div class="checkbox-item">
            <input type="checkbox" id="autoDetectLanguage" checked>
            <label for="autoDetectLanguage">自动检测源语言</label>
          </div>
          <div class="checkbox-description">
            自动检测网页内容的语言，无需手动选择
          </div>
        </div>
      </section>
      
      <section class="settings-section">
        <h2><i class="fas fa-bolt"></i> 性能设置</h2>
        
        <div class="form-group">
          <label for="translationDelay">翻译延迟（毫秒）:</label>
          <input type="number" id="translationDelay" value="500" min="0" max="5000" step="100">
          <div class="checkbox-description">
            为避免频繁请求，设置翻译操作的最小间隔时间
          </div>
        </div>
        
        <div class="form-group">
          <label for="maxCharacters">单次翻译最大字符数:</label>
          <input type="number" id="maxCharacters" value="5000" min="100" max="20000" step="100">
          <div class="checkbox-description">
            单次翻译请求的最大字符数限制，防止API超限
          </div>
        </div>
      </section>
      
      <div class="button-group">
        <button class="btn-save" id="saveBtn">
          <i class="fas fa-save"></i> 保存设置
        </button>
        <button class="btn-reset" id="resetBtn">
          <i class="fas fa-redo"></i> 恢复默认
        </button>
      </div>
      
      <div class="status" id="statusMessage"></div>
    </main>
    
    <footer>
      <p>© 2026 双语翻译助手 v1.0.0 | <a href="#" id="backToPopup">返回扩展</a> | <a href="#" id="viewSource">查看源代码</a></p>
    </footer>
  </div>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
  <script src="options.js"></script>
</body>
</html>
